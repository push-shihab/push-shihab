name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours
  workflow_dispatch:          # Allows manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Stats SVGs
        run: |
          # Main GitHub Stats card
          curl -s "https://github-readme-stats.vercel.app/api?username=push-shihab&show_icons=true&theme=radical&hide_border=false&count_private=true" > github-stats.svg
          
          # Top Languages card
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=push-shihab&layout=compact&theme=radical&hide_border=false" > top-langs.svg
          
          # Streak stats (optional)
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=push-shihab&theme=radical&hide_border=false" > streak-stats.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg streak-stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHub stats SVGs [skip ci]" && git push)
